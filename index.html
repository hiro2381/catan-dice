<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カタン 騎士版サイコロ</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #121212;
      color: #f5f5f5;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .small {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .dice-area {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .dice {
      background: #2a2a2a;
      border-radius: 12px;
      text-align: center;
      padding: 16px 8px;
      font-size: 22px;
      font-weight: bold;
    }

    .dice-label {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 6px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #4f8cff;
      color: white;
    }

    button:active {
      transform: scale(0.97);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .secondary {
      background: #444;
    }

    .danger {
      background: #b23b3b;
    }

    .player {
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      background: #252525;
    }

    .me {
      border-color: #4f8cff;
      box-shadow: 0 0 0 1px #4f8cff inset;
    }

    .turn {
      border-color: #ffcf4f;
      box-shadow: 0 0 0 1px #ffcf4f inset;
    }

    .player-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 17px;
    }

    .commodity {
      display: grid;
      grid-template-columns: 1fr 44px 44px 44px;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }

    .commodity-name {
      font-size: 15px;
    }

    .count {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .mini-btn {
      padding: 8px 0;
      font-size: 18px;
      border-radius: 10px;
      background: #555;
    }

    .status {
      color: #aaa;
      font-size: 13px;
      margin-top: 8px;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h1>カタン 騎士版サイコロ</h1>
  <div class="small" id="roomInfo">読み込み中...</div>

  <div class="card">
    <h2>現在の手番</h2>
    <div id="turnText">---</div>

    <div class="button-row" style="margin-top: 12px;">
      <button onclick="nextTurn()">手番を進める</button>
    </div>
  </div>

  <div class="card">
    <h2>サイコロ</h2>

    <div class="dice-area">
      <div class="dice">
        <div class="dice-label">赤</div>
        <div id="redDice">-</div>
      </div>

      <div class="dice">
        <div class="dice-label">黄</div>
        <div id="yellowDice">-</div>
      </div>

      <div class="dice">
        <div class="dice-label">イベント</div>
        <div id="eventDice">-</div>
      </div>
    </div>

    <div class="button-row">
      <button onclick="rollDice()">サイコロを振る</button>
    </div>

    <div class="status" id="lastRoll">まだ振っていません</div>
  </div>

  <div class="card">
    <h2>交易品</h2>
    <div id="playersArea"></div>
  </div>

  <div class="card">
    <h2>管理</h2>
    <div class="button-row">
      <button class="danger" onclick="resetRoom()">リセット</button>
    </div>
    <div class="status" id="statusText">Firebase接続中...</div>
  </div>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <script>
    // ここにFirebaseの設定を入れる
const firebaseConfig = {
  apiKey: "AIzaSyCRftlPXsqhJihTgnotqVecrDrDO8O15IE",
  authDomain: "kishicatan.firebaseapp.com",
  databaseURL: "https://kishicatan-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kishicatan",
  storageBucket: "kishicatan.firebasestorage.app",
  messagingSenderId: "166359530442",
  appId: "1:166359530442:web:e23b349a460ad2f19aad33",
//   measurementId: "G-5DCGDQB34G"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(location.search);

    const roomId = params.get("room") || "test";
    const myPlayerId = params.get("player") || "1";

    const players = {
      1: { name: "プレイヤー1" },
      2: { name: "プレイヤー2" },
      3: { name: "プレイヤー3" },
      4: { name: "プレイヤー4" }
    };

    const roomRef = db.ref("rooms/" + roomId);

    const initialRoomData = {
      currentTurn: 1,
      dice: {
        red: "-",
        yellow: "-",
        event: "-"
      },
      lastRollTime: "",
      players: {
        1: {
          name: "プレイヤー1",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        },
        2: {
          name: "プレイヤー2",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        },
        3: {
          name: "プレイヤー3",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        },
        4: {
          name: "プレイヤー4",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        }
      }
    };

    document.getElementById("roomInfo").textContent =
      `部屋: ${roomId} / 自分: プレイヤー${myPlayerId}`;

    roomRef.once("value").then(snapshot => {
      if (!snapshot.exists()) {
        return roomRef.set(initialRoomData);
      }
    });

    roomRef.on("value", snapshot => {
      const data = snapshot.val();

      if (!data) return;

      render(data);
      document.getElementById("statusText").textContent = "同期中";
    }, error => {
      document.getElementById("statusText").textContent =
        "エラー: " + error.message;
    });

    function render(data) {
      const currentTurn = data.currentTurn || 1;
      const currentPlayerName =
        data.players?.[currentTurn]?.name || `プレイヤー${currentTurn}`;

      document.getElementById("turnText").textContent =
        currentPlayerName + " の番";

      document.getElementById("redDice").textContent = data.dice?.red ?? "-";
      document.getElementById("yellowDice").textContent = data.dice?.yellow ?? "-";
      document.getElementById("eventDice").textContent = data.dice?.event ?? "-";

      document.getElementById("lastRoll").textContent =
        data.lastRollTime ? "最後に振った時間: " + data.lastRollTime : "まだ振っていません";

      const playersArea = document.getElementById("playersArea");
      playersArea.innerHTML = "";

      for (const id of Object.keys(players)) {
        const playerData = data.players?.[id] || {
          name: players[id].name,
          commodities: { paper: 0, cloth: 0, coin: 0 }
        };

        const commodities = playerData.commodities || {
          paper: 0,
          cloth: 0,
          coin: 0
        };

        const div = document.createElement("div");
        div.className = "player";

        if (String(id) === String(myPlayerId)) {
          div.classList.add("me");
        }

        if (Number(id) === Number(currentTurn)) {
          div.classList.add("turn");
        }

        div.innerHTML = `
          <div class="player-title">
            ${playerData.name}
            ${String(id) === String(myPlayerId) ? " / 自分" : ""}
            ${Number(id) === Number(currentTurn) ? " / 手番" : ""}
          </div>

          ${commodityRow(id, "paper", "紙", commodities.paper || 0)}
          ${commodityRow(id, "cloth", "布", commodities.cloth || 0)}
          ${commodityRow(id, "coin", "硬貨", commodities.coin || 0)}
        `;

        playersArea.appendChild(div);
      }
    }

    function commodityRow(playerId, key, label, value) {
      return `
        <div class="commodity">
          <div class="commodity-name">${label}</div>
          <button class="mini-btn" onclick="changeCommodity('${playerId}', '${key}', -1)">-</button>
          <div class="count">${value}</div>
          <button class="mini-btn" onclick="changeCommodity('${playerId}', '${key}', 1)">+</button>
        </div>
      `;
    }

    function rollDice() {
      const red = randomInt(1, 6);
      const yellow = randomInt(1, 6);

      const eventFaces = [
        "蛮族",
        "蛮族",
        "蛮族",
        "緑",
        "黄",
        "青"
      ];

      const event = eventFaces[randomInt(0, eventFaces.length - 1)];

      const now = new Date();
      const timeText = now.toLocaleTimeString("ja-JP", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      roomRef.update({
        dice: {
          red,
          yellow,
          event
        },
        lastRollTime: timeText
      });
    }

    function nextTurn() {
      roomRef.child("currentTurn").transaction(current => {
        const now = Number(current || 1);
        return now >= 4 ? 1 : now + 1;
      });
    }

    function changeCommodity(playerId, commodityKey, amount) {
      const ref = roomRef.child(`players/${playerId}/commodities/${commodityKey}`);

      ref.transaction(current => {
        const now = Number(current || 0);
        const next = now + amount;
        return next < 0 ? 0 : next;
      });
    }

    function resetRoom() {
      const ok = confirm("本当にリセットする？");
      if (!ok) return;

      roomRef.set(initialRoomData);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
  </script>
</body>
</html>
