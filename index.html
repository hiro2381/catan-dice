<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カタン 騎士版サイコロ</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #121212;
      color: #f5f5f5;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .small {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .dice-area {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .dice {
      background: #2a2a2a;
      border: 3px solid transparent;
      border-radius: 12px;
      text-align: center;
      padding: 16px 8px;
      font-size: 22px;
      font-weight: bold;
      transition: 0.2s;
    }

    .dice-label {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 6px;
    }

    .glow-green {
      border-color: #49d17d !important;
      box-shadow: 0 0 22px #49d17d, 0 0 6px #49d17d inset;
      background: #173522;
      color: #d8ffe4;
    }

    .glow-yellow {
      border-color: #ffd84f !important;
      box-shadow: 0 0 22px #ffd84f, 0 0 6px #ffd84f inset;
      background: #3b3318;
      color: #fff2b0;
    }

    .glow-blue {
      border-color: #4f8cff !important;
      box-shadow: 0 0 22px #4f8cff, 0 0 6px #4f8cff inset;
      background: #17243b;
      color: #d9e7ff;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #4f8cff;
      color: white;
    }

    button:active {
      transform: scale(0.97);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .secondary {
      background: #444;
    }

    .danger {
      background: #b23b3b;
    }

    .player {
      border: 2px solid #333;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      background: #252525;
      transition: 0.2s;
    }

    .me {
      border-color: #4f8cff;
      box-shadow: 0 0 0 1px #4f8cff inset;
    }

    .turn {
      border-color: #ffcf4f;
      box-shadow: 0 0 0 1px #ffcf4f inset;
    }

    .hit-player-green {
      border-color: #49d17d !important;
      box-shadow: 0 0 16px #49d17d;
      background: #1d3225;
    }

    .hit-player-yellow {
      border-color: #ffd84f !important;
      box-shadow: 0 0 16px #ffd84f;
      background: #373017;
    }

    .hit-player-blue {
      border-color: #4f8cff !important;
      box-shadow: 0 0 16px #4f8cff;
      background: #1a263b;
    }

    .player-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 17px;
    }

    .commodity {
      display: grid;
      grid-template-columns: 1fr 44px 44px 44px;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }

    .commodity-name {
      font-size: 15px;
    }

    .count {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .mini-btn {
      padding: 8px 0;
      font-size: 18px;
      border-radius: 10px;
      background: #555;
    }

    .status {
      color: #aaa;
      font-size: 13px;
      margin-top: 8px;
      word-break: break-all;
    }

    .progress-info {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #2a2a2a;
      font-size: 14px;
      line-height: 1.6;
    }

    .progress-hit {
      color: #ffffff;
      font-weight: bold;
    }

    .rule-note {
      color: #aaa;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 8px;
    }

    .test-note {
      color: #bbb;
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <h1>カタン 騎士版サイコロ</h1>
  <div class="small" id="roomInfo">読み込み中...</div>

  <div class="card">
    <h2>現在の手番</h2>
    <div id="turnText">---</div>

    <div class="button-row" style="margin-top: 12px;">
      <button onclick="nextTurn()">手番を進める</button>
    </div>
  </div>

  <div class="card">
    <h2>サイコロ</h2>

    <div class="dice-area">
      <div class="dice">
        <div class="dice-label">赤</div>
        <div id="redDice">-</div>
      </div>

      <div class="dice">
        <div class="dice-label">黄</div>
        <div id="yellowDice">-</div>
      </div>

      <div class="dice" id="eventDiceBox">
        <div class="dice-label">イベント</div>
        <div id="eventDice">-</div>
      </div>
    </div>

    <div class="button-row">
      <button onclick="rollDice()">サイコロを振る</button>
      <button class="secondary" onclick="testBlueHit()">青テスト</button>
      <button class="secondary" onclick="testGreenHit()">緑テスト</button>
      <button class="secondary" onclick="testYellowHit()">黄テスト</button>
    </div>

    <div class="test-note">
      テスト：自分の硬貨・青を1以上にして青テストを押すと、自分の画面だけ青く光る。<br>
      紙・緑なら緑テスト、布・黄なら黄テスト。
    </div>

    <div class="status" id="lastRoll">まだ振っていません</div>

    <div class="progress-info" id="progressInfo">
      進歩カード判定なし
    </div>

    <div class="rule-note">
      判定：紙→緑、布→黄、硬貨→青。<br>
      レベル1なら赤1・2、レベル2なら赤1・2・3、レベル5なら赤1〜6で対象。
    </div>
  </div>

  <div class="card">
    <h2>都市改善レベル</h2>
    <div id="playersArea"></div>
  </div>

  <div class="card">
    <h2>管理</h2>
    <div class="button-row">
      <button class="danger" onclick="resetRoom()">リセット</button>
    </div>
    <div class="status" id="statusText">Firebase接続中...</div>
  </div>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCRftlPXsqhJihTgnotqVecrDrDO8O15IE",
      authDomain: "kishicatan.firebaseapp.com",
      databaseURL: "https://kishicatan-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kishicatan",
      storageBucket: "kishicatan.firebasestorage.app",
      messagingSenderId: "166359530442",
      appId: "1:166359530442:web:e23b349a460ad2f19aad33"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(location.search);

    const roomId = params.get("room") || "test";
    const myPlayerId = params.get("player") || "1";

    const players = {
      1: { name: "プレイヤー1" },
      2: { name: "プレイヤー2" },
      3: { name: "プレイヤー3" },
      4: { name: "プレイヤー4" }
    };

    const roomRef = db.ref("rooms/" + roomId);

    const initialRoomData = {
      currentTurn: 1,
      dice: {
        red: "-",
        yellow: "-",
        event: "-"
      },
      lastRollTime: "",
      players: {
        1: {
          name: "プレイヤー1",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        },
        2: {
          name: "プレイヤー2",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        },
        3: {
          name: "プレイヤー3",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        },
        4: {
          name: "プレイヤー4",
          commodities: { paper: 0, cloth: 0, coin: 0 }
        }
      }
    };

    document.getElementById("roomInfo").textContent =
      `部屋: ${roomId} / 自分: プレイヤー${myPlayerId}`;

    roomRef.once("value").then(snapshot => {
      if (!snapshot.exists()) {
        return roomRef.set(initialRoomData);
      }
    });

    roomRef.on("value", snapshot => {
      const data = snapshot.val();

      if (!data) return;

      render(data);
      document.getElementById("statusText").textContent = "同期中";
    }, error => {
      document.getElementById("statusText").textContent =
        "エラー: " + error.message;
    });

    function render(data) {
      const currentTurn = data.currentTurn || 1;
      const currentPlayerName =
        data.players?.[currentTurn]?.name || `プレイヤー${currentTurn}`;

      document.getElementById("turnText").textContent =
        currentPlayerName + " の番";

      document.getElementById("redDice").textContent = data.dice?.red ?? "-";
      document.getElementById("yellowDice").textContent = data.dice?.yellow ?? "-";
      document.getElementById("eventDice").textContent = data.dice?.event ?? "-";

      document.getElementById("lastRoll").textContent =
        data.lastRollTime ? "最後に振った時間: " + data.lastRollTime : "まだ振っていません";

      const progressResult = getProgressResult(data);

      updateProgressHighlight(progressResult);

      const playersArea = document.getElementById("playersArea");
      playersArea.innerHTML = "";

      for (const id of Object.keys(players)) {
        const playerData = data.players?.[id] || {
          name: players[id].name,
          commodities: { paper: 0, cloth: 0, coin: 0 }
        };

        const commodities = playerData.commodities || {
          paper: 0,
          cloth: 0,
          coin: 0
        };

        const div = document.createElement("div");
        div.className = "player";

        const isMe = String(id) === String(myPlayerId);
        const isTurn = Number(id) === Number(currentTurn);
        const isHit = progressResult.hitPlayerIds.includes(String(id));

        if (isMe) {
          div.classList.add("me");
        }

        if (isTurn) {
          div.classList.add("turn");
        }

        /*
          ここが変更点。
          自分の画面では、自分が対象のときだけ自分の枠を光らせる。
          他人だけが対象の場合、他人の枠は光らせない。
        */
        if (isMe && isHit) {
          if (progressResult.color === "緑") {
            div.classList.add("hit-player-green");
          }

          if (progressResult.color === "黄") {
            div.classList.add("hit-player-yellow");
          }

          if (progressResult.color === "青") {
            div.classList.add("hit-player-blue");
          }
        }

        div.innerHTML = `
          <div class="player-title">
            ${playerData.name}
            ${isMe ? " / 自分" : ""}
            ${isTurn ? " / 手番" : ""}
            ${isMe && isHit ? " / 進歩カード対象" : ""}
          </div>

          ${levelRow(id, "paper", "紙・緑", commodities.paper || 0)}
          ${levelRow(id, "cloth", "布・黄", commodities.cloth || 0)}
          ${levelRow(id, "coin", "硬貨・青", commodities.coin || 0)}
        `;

        playersArea.appendChild(div);
      }
    }

    function levelRow(playerId, key, label, value) {
      return `
        <div class="commodity">
          <div class="commodity-name">${label}</div>
          <button class="mini-btn" onclick="changeLevel('${playerId}', '${key}', -1)">-</button>
          <div class="count">${value}</div>
          <button class="mini-btn" onclick="changeLevel('${playerId}', '${key}', 1)">+</button>
        </div>
      `;
    }

    function getProgressResult(data) {
      const red = Number(data.dice?.red);
      const event = data.dice?.event;

      const result = {
        active: false,
        color: event,
        red: red,
        label: "",
        key: "",
        glowClass: "",
        hitPlayers: [],
        hitPlayerIds: []
      };

      const colorMap = {
        "緑": {
          key: "paper",
          label: "紙",
          glowClass: "glow-green"
        },
        "黄": {
          key: "cloth",
          label: "布",
          glowClass: "glow-yellow"
        },
        "青": {
          key: "coin",
          label: "硬貨",
          glowClass: "glow-blue"
        }
      };

      if (!colorMap[event] || !red) {
        return result;
      }

      const target = colorMap[event];

      result.active = true;
      result.key = target.key;
      result.label = target.label;
      result.glowClass = target.glowClass;

      for (const id of Object.keys(players)) {
        const playerData = data.players?.[id];
        const level = Number(playerData?.commodities?.[target.key] || 0);

        /*
          レベル0 → 対象なし
          レベル1 → 赤1,2
          レベル2 → 赤1,2,3
          レベル3 → 赤1,2,3,4
          レベル4 → 赤1,2,3,4,5
          レベル5 → 赤1,2,3,4,5,6
        */
        if (level > 0 && red <= level + 1) {
          result.hitPlayerIds.push(String(id));
          result.hitPlayers.push(`${playerData?.name || `プレイヤー${id}`}（${target.label}Lv.${level}）`);
        }
      }

      return result;
    }

    function updateProgressHighlight(result) {
      const eventDiceBox = document.getElementById("eventDiceBox");
      const progressInfo = document.getElementById("progressInfo");

      eventDiceBox.classList.remove("glow-green", "glow-yellow", "glow-blue");

      if (!result.active) {
        progressInfo.textContent = "進歩カード判定なし";
        return;
      }

      const isMyHit = result.hitPlayerIds.includes(String(myPlayerId));

      /*
        ここが一番大事。
        自分が対象のときだけイベントダイスを光らせる。
        他人が対象でも、自分が対象外なら光らせない。
      */
      if (isMyHit) {
        eventDiceBox.classList.add(result.glowClass);

        progressInfo.innerHTML = `
          <span class="progress-hit">あなたが進歩カード対象</span><br>
          色：${result.color} / 赤：${result.red}<br>
          対象：${result.hitPlayers.join("、")}
        `;
        return;
      }

      if (result.hitPlayers.length > 0) {
        progressInfo.innerHTML = `
          自分は対象外<br>
          色：${result.color} / 赤：${result.red}<br>
          他の対象：${result.hitPlayers.join("、")}
        `;
      } else {
        progressInfo.textContent =
          `色：${result.color} / 赤：${result.red} → 対象者なし`;
      }
    }

    function rollDice() {
      const red = randomInt(1, 6);
      const yellow = randomInt(1, 6);

      const eventFaces = [
        "蛮族",
        "蛮族",
        "蛮族",
        "緑",
        "黄",
        "青"
      ];

      const event = eventFaces[randomInt(0, eventFaces.length - 1)];

      const now = new Date();
      const timeText = now.toLocaleTimeString("ja-JP", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      roomRef.update({
        dice: {
          red,
          yellow,
          event
        },
        lastRollTime: timeText
      });
    }

    function testBlueHit() {
      roomRef.update({
        dice: {
          red: 1,
          yellow: 1,
          event: "青"
        },
        lastRollTime: "青テスト"
      });
    }

    function testGreenHit() {
      roomRef.update({
        dice: {
          red: 1,
          yellow: 1,
          event: "緑"
        },
        lastRollTime: "緑テスト"
      });
    }

    function testYellowHit() {
      roomRef.update({
        dice: {
          red: 1,
          yellow: 1,
          event: "黄"
        },
        lastRollTime: "黄テスト"
      });
    }

    function nextTurn() {
      roomRef.child("currentTurn").transaction(current => {
        const now = Number(current || 1);
        return now >= 4 ? 1 : now + 1;
      });
    }

    function changeLevel(playerId, levelKey, amount) {
      const ref = roomRef.child(`players/${playerId}/commodities/${levelKey}`);

      ref.transaction(current => {
        const now = Number(current || 0);
        const next = now + amount;

        if (next < 0) return 0;
        if (next > 5) return 5;

        return next;
      });
    }

    function resetRoom() {
      const ok = confirm("本当にリセットする？");
      if (!ok) return;

      roomRef.set(initialRoomData);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
  </script>
</body>
</html>
